<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.page_title %}{{ page.page_title }}{% else %}{{ page.title }} | 川津小学校PTA{% endif %}</title>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% if site.google_analytics != "" %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}
</head>
<body>

<div id="header">
  <div class="header-left">
    <h1><a href="{{ '/' | relative_url }}">川津小学校ＰＴＡ</a></h1>
    <a href="https://www.facebook.com/kawatusyouPTA" target="_blank" class="fb-link" title="Facebook">
      <img src="https://lh3.googleusercontent.com/d/1tqFr1ufpGpeCAgcWIQf6bIoGC7NCNUC2" alt="Facebook">
    </a>
  </div>
  <div class="header-img">
    <img src="https://lh3.googleusercontent.com/d/1gOrIZzEnvAQTstVzJLyb3cUMQPQQhfnt" alt="">
  </div>
</div>

<nav id="nav">
  <ul>
    <li><a href="{{ '/' | relative_url }}">ホーム</a></li>
    <li><a href="{{ '/event/' | relative_url }}">お知らせ</a></li>
    <li><a href="{{ '/info/' | relative_url }}">役立ち情報</a></li>
    <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSctALNUveZYOu5kA8ioXaZVG1Yjc2f_xwXhRlkJS7y-bt_YTg/viewform?usp=publish-editor" target="_blank">コンタクト</a></li>
  </ul>
</nav>

{{ content }}

<div id="footer">
  Copyright &copy; 川津小学校ＰＴＡ All Rights Reserved.
  <span id="admin-link" style="display:none">
    &nbsp;|&nbsp;<a href="https://drive.google.com/drive/folders/1zCnwbpoT5j4lpaTRItV0L6EZ4br6HvOD?usp=drive_link" target="_blank">管理者ページ</a>
  </span>
</div>

<script>
(function(){
  try {
    if (localStorage.getItem('members_pw')) {
      document.getElementById('admin-link').style.display = 'inline';
    }
  } catch(e) {}
})();
</script>

</body>
</html>
